# options_agent operational configuration
# Secrets (ALPACA_API_KEY, ALPACA_SECRET_KEY, ANTHROPIC_API_KEY) go in environment variables — not here.
# Load with: Config.from_toml(Path("config.toml"))

universe_file = "universe.txt"
timezone = "America/New_York"
entry_times = ["10:30", "13:00", "15:00"]
session_open_blackout_minutes  = 30   # replaces obsolete blackout_minutes (WP-8.4)
session_close_blackout_minutes = 30
db_url = "sqlite:///options_agent.db"
alpaca_paper = true
use_real_data_tools = true    # false → mock data (dev/CI); true → live Alpaca + yfinance; requires ANTHROPIC_API_KEY

# Entry limit pricing: combo mid (conservative tick rounding) nudged toward
# the market by this offset so orders actually fill. Replaces the deprecated
# fixed slice_limit_price.
order_limit_offset_from_mid = 0.02

# Stale exit-order repricing: a WORKING close order older than this is
# cancelled and resubmitted at a fresh mark, widening toward the market by
# offset_step per attempt (capped at max_widenings attempts of widening).
exit_reprice_after_minutes = 10
exit_reprice_offset_step = 0.05
exit_reprice_max_widenings = 5

# Agent / reasoner
model_id = "claude-sonnet-4-6"   # stamp on ContextSnapshot; upgrade to claude-opus-4-8 only if journal shows reasoning failures

[limits]
# Bump limits_version whenever any threshold changes so WP-7 analytics can
# correlate trade outcomes with the exact limits active at the time.
limits_version = "0.5.0"   # 0.5.0: chain_filter min_open_interest 500→250 + min_abs_delta 0.15→0.10
                           #        (diversified 10-symbol universe; condor wings at classic deltas);
                           #        exit_plan_bounds time_stop_dte_max 45→29 (no instant time-stops).
                           # 0.4.0: min_dte 20→30 (entries no longer land inside the 21-DTE time-stop)

# allowed_strategies is intentionally absent here — it is derived from
# [playbook] by Config._sync_allowed_strategies. Never set it in [limits];
# PlaybookConfig is the single source of truth.

# Risk / sizing
max_loss_per_trade_pct = 0.01        # 1% of equity hard ceiling per trade
max_open_positions = 5
conviction_floor = 0.35              # gate-and-flat: below this → 0 contracts (CONVICTION_FLOOR)

# Greek bands expressed as fractions of account equity.
# max_dollar_delta_pct: |net dollar-delta| ≤ pct × equity
# max_dollar_vega_pct:  |net dollar-vega per 1 vol pt| ≤ pct × equity
max_dollar_delta_pct = 0.20
max_dollar_vega_pct = 0.025

# Concentration caps
max_underlying_concentration_pct = 0.20
# max_sector_concentration_pct disabled until WP-3 attaches sector data
# max_sector_concentration_pct = 0.30

# min_total_theta left unconstrained (omit = None) so long-premium strategies
# (debit spreads in low-IV regimes) are not silently banned.
# min_total_theta = 0.0

# Event proximity (entry gate only)
event_blackout_days = 5

# Buying power floor (reads options_buying_power, not buying_power)
min_buying_power_pct = 0.10

# Duplicate / conflict detection thresholds
expiration_overlap_days = 5      # same strategy + expiration within 5 days → duplicate
opposing_delta_tolerance = 0.05  # |net_delta| above this triggers conflict check

[limits.chain_filter]
# min_open_interest 500→250 (limits 0.5.0): 500 was calibrated for SPY/QQQ-class
# chains. The diversified universe (TLT/GLD/XLE/EEM) carries tradable 30–45 DTE
# strikes — especially 0.10–0.20 delta wings — with OI in the 100–500 range; at
# 500 those chains starve and the agent gets pushed back into correlated index
# names. The spread rule below remains the binding quote-quality gate.
min_open_interest = 250
max_spread_pct_of_mid = 0.10   # primary rule: spread ≤ 10% of mid
max_spread_abs_floor = 0.05    # also pass if spread ≤ $0.05 (prevents false exclusions)
# min_dte must clear the 21-DTE time-stop default by a useful margin: with the
# old min_dte=20, an entry at 20–25 DTE was time-stopped immediately or within
# days, paying two spreads for nothing. 30–45 DTE is the classic entry window.
min_dte = 30
max_dte = 45
# min_abs_delta 0.15→0.10 (limits 0.5.0): a 0.15 floor forced iron-condor long
# wings to 0.15+ delta (classic wings sit at 0.05–0.10), producing narrow
# low-credit condors. Token budget is already capped by max_contracts_per_chain.
min_abs_delta = 0.10
max_abs_delta = 0.45

[limits.exit_plan_defaults]
profit_target_pct = 0.50                # close at 50% of max profit
stop_loss_max_loss_fraction = 0.50      # close when unrealized_pnl ≤ -(fraction × est_max_loss)
time_stop_dte = 21                      # close at 21 DTE regardless of P&L

# Policy bounds checked by the validator against a proposal's exit_plan.
# Distinct from exit_plan_defaults (what's sensible) — these are tunable limits.
# Bump limits_version whenever any bound changes.
[limits.exit_plan_bounds]
profit_target_pct_min = 0.25
profit_target_pct_max = 1.00
stop_loss_max_loss_fraction_min = 0.10  # stop must trigger at ≥ 10% of max loss
stop_loss_max_loss_fraction_max = 1.00  # stop no looser than 100% of max loss
time_stop_dte_min = 7                   # must have a time-stop; 7 DTE minimum
# time_stop_dte_max must stay below chain_filter.min_dte (30): a bounds-legal
# time stop of 30–45 DTE on a 30-DTE entry would close the position at the very
# next monitor cycle, paying two spreads for nothing (limits 0.5.0; was 45).
time_stop_dte_max = 29

# ---------------------------------------------------------------------------
# Strategy playbook
# Bump playbook_version whenever thresholds or strategy sets change so WP-7
# analytics can correlate outcomes with the exact playbook active at the time.
# ---------------------------------------------------------------------------
[playbook]
playbook_version = "1.2.0"   # 1.2.0: removed iron_butterfly (see note below)
                             # 1.1.0: removed covered_call / cash_secured_put (see note below)

# IV-rank band boundaries (0.0–1.0 percentile of the symbol's trailing-year IV).
# These are v1 placeholders — expect WP-7 evidence to drive retunes.
iv_rank_high_threshold = 0.50   # ≥ this → high band (sell premium)
iv_rank_low_threshold  = 0.25   # < this → low band (buy premium); between → medium

# VIX regime tiers (advisory context only — not enforced by the validator).
# Named for volatility level, not market direction.
vix_high_vol_threshold = 25.0   # > this → high_vol
vix_low_vol_threshold  = 15.0   # < this → low_vol; between → normal

# Strategy sets per IV band.
# High/low are hard-enforced; medium is permissive (agent picks based on thesis).
# covered_call and cash_secured_put were removed in 1.1.0: the validator's
# unconditional naked-short check (Core Principle 3: defined-risk only) rejects
# any short leg without a covering long leg, so those strategies could never
# pass validation — keeping them in the playbook only wasted reasoning cycles
# on proposals that were guaranteed rejections. Re-add them only if the
# validator ever gains share-coverage / cash-reservation checks.
# iron_butterfly removed in 1.2.0 for the same guaranteed-rejection reason:
# its body sells a call and a put at the SAME strike, and |call Δ| + |put Δ| ≈ 1
# at any strike, so both body legs can never simultaneously pass the chain
# filter's delta band (|Δ| ≤ max_abs_delta = 0.45 requires call Δ ≤ 0.45 AND
# ≥ 0.55 — a contradiction). The agent literally cannot see the strikes needed
# to build one. Re-add only if max_abs_delta is raised to ≥ 0.55, accepting the
# side effect of admitting near-ITM directional verticals.
high_iv_strategies = [
    "bear_call_spread",
    "bull_put_spread",
    "iron_condor",
]
medium_iv_strategies = [
    "bear_call_spread",
    "bear_put_spread",
    "bull_call_spread",
    "bull_put_spread",
    "iron_condor",
]
low_iv_strategies = [
    "bear_put_spread",
    "bull_call_spread",
]
