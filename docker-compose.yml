services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: options_agent_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  options-agent:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_URL: sqlite:////app/data/options_agent.db
    volumes:
      - agent_data:/app/data
      - ./config.toml:/app/config.toml:ro
      - ./universe.txt:/app/universe.txt:ro

volumes:
  postgres_data:
  agent_data:
